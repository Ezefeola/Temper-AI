name: Community Release

on:
  pull_request:
    branches:
      - main
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  DOTNET_VERSION: "10.0.x"
  SOLUTION_FILE: "TemperAI.slnx"

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_FILE }} --no-restore --configuration Release

      - name: Run tests
        run: dotnet test ${{ env.SOLUTION_FILE }} --no-build --configuration Release --verbosity normal --logger trx --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/

  publish:
    name: Publish stable community release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tagged commit belongs to main
        shell: pwsh
        run: |
          git fetch origin main --depth=1
          $branches = git branch -r --contains ${{ github.sha }}

          if (-not ($branches | Select-String -Pattern 'origin/main')) {
            Write-Error "The tag ${{ github.ref_name }} points to commit ${{ github.sha }}, which is not contained in origin/main. Stable public releases are only allowed from commits that are already in main."
          }

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build release bundles
        shell: pwsh
        run: >-
          ./scripts/release/Build-CommunityReleaseBundle.ps1
          -Version "${{ github.ref_name }}"
          -Repository "${{ github.repository }}"
          -OutputRoot "artifacts/release"

      - name: Upload release bundles artifact
        uses: actions/upload-artifact@v4
        with:
          name: community-release-bundles
          path: artifacts/release/

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          name: TemperAI ${{ github.ref_name }}
          make_latest: true
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            artifacts/release/temper-ai-win-x64.zip
            artifacts/release/temper-ai-assets-*.zip
            artifacts/release/manifest.json
            artifacts/release/install.ps1
